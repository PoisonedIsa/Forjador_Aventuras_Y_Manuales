<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge D&D - Creador de Manuales</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=MedievalSharp&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Quill Editor (Editor de Texto Enriquecido) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <!-- HTML2PDF (Librería para exportación real a PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --page-bg: #fdfaf6;
            --title-color: #7f1d1d;
            --table-bg: #fdf1dc;
            --table-border: transparent;
            --border-width: 0px;
            --border-thin: 0px;
            --page-texture: none;
            --page-texture-size: auto;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* --- ESTILOS DEL EDITOR QUILL --- */
        .ql-editor { font-family: 'Open Sans', sans-serif; min-height: 80px; font-size: 14px; }
        .ql-snow .ql-picker.ql-font .ql-picker-label::before, .ql-snow .ql-picker.ql-font .ql-picker-item::before { content: 'Global'; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="cinzel"]::before, .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="cinzel"]::before { content: 'Cinzel'; font-family: 'Cinzel', serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="medievalsharp"]::before, .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="medievalsharp"]::before { content: 'Medieval'; font-family: 'MedievalSharp', cursive; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="lora"]::before, .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="lora"]::before { content: 'Lora'; font-family: 'Lora', serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="opensans"]::before, .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="opensans"]::before { content: 'Open Sans'; font-family: 'Open Sans', sans-serif; }

        .ql-snow .ql-toolbar button.ql-customColor { width: 30px; position: relative; }
        .ql-snow .ql-toolbar button.ql-customColor::before { content: '🎨'; font-size: 16px; }
        .ql-snow .ql-toolbar button.ql-customBg { width: 30px; position: relative; }
        .ql-snow .ql-toolbar button.ql-customBg::before { content: '🖌️'; font-size: 16px; }
        
        .ql-font-cinzel { font-family: 'Cinzel', serif; }
        .ql-font-medievalsharp { font-family: 'MedievalSharp', cursive; }
        .ql-font-lora { font-family: 'Lora', serif; }
        .ql-font-opensans { font-family: 'Open Sans', sans-serif; }
        
        .quill-content .ql-align-center { text-align: center; }
        .quill-content .ql-align-right { text-align: right; }
        .quill-content .ql-align-justify { text-align: justify; }
        .quill-content .ql-size-small { font-size: 0.75em; }
        .quill-content .ql-size-large { font-size: 1.5em; }
        .quill-content .ql-size-huge { font-size: 2.5em; }
        .quill-content p { margin-bottom: 0.5em; }
        .quill-content ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.5em; }
        .quill-content ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.5em; }
        .quill-content li { margin-bottom: 0.25em; }
        h1.quill-content p, h2.quill-content p { margin: 0; display: inline; }

        /* --- CONTENEDORES HOJA A4 --- */
        .a4-page {
            width: 210mm;
            height: 297mm;
            background-color: var(--page-bg);
            background-image: var(--page-texture);
            background-size: var(--page-texture-size);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            position: relative;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .page-content {
            height: 100%;
            padding-left: 15mm;
            padding-right: 15mm;
            padding-top: 20mm;   /* Espacio para el encabezado */
            padding-bottom: 20mm; /* Espacio para el pie de página */
            column-fill: auto;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .watermark {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.05;
            pointer-events: none;
            transform: rotate(-45deg);
            z-index: 0;
            user-select: none;
            font-size: 150px;
            font-weight: bold;
            font-family: 'Cinzel', serif;
            color: currentColor;
            white-space: nowrap;
        }

        @media print {
            @page { size: A4; margin: 0; }
            body, html { margin: 0; padding: 0; background: #fff !important; width: 100%; height: 100%; }
            #preview-container { display: flex !important; }
            #editor-container, .w-72, .no-print { display: none !important; }
            #main-area { overflow: visible !important; display: block !important; position: static !important; background: transparent !important; }
            .print-area { height: auto !important; overflow: visible !important; display: block !important; }
            .a4-page { margin-bottom: 0 !important; box-shadow: none !important; page-break-after: always; break-after: page; }
            .break-inside-avoid { page-break-inside: avoid; }
        }

        body.pdf-export-mode .a4-page { box-shadow: none !important; margin: 0 !important; border: none !important; border-radius: 0 !important; }
        body.pdf-export-mode .page-content { overflow: visible !important; }
        body.pdf-export-mode .ql-editor, body.pdf-export-mode .quill-content { transform: none !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .editor-block-wrapper.dragging {
            opacity: 0.45;
            transform: scale(0.995);
        }
        .editor-block-wrapper.drag-over-before,
        .editor-block-wrapper.drag-over-after {
            position: relative;
        }
        .editor-block-wrapper.drag-over-before::before,
        .editor-block-wrapper.drag-over-after::after {
            content: '';
            position: absolute;
            left: 3.4rem;
            right: 0;
            height: 4px;
            background: #dc2626;
            border-radius: 999px;
            z-index: 50;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12);
        }
        .editor-block-wrapper.drag-over-before::before {
            top: -10px;
        }
        .editor-block-wrapper.drag-over-after::after {
            bottom: -10px;
        }
        .drag-handle {
            cursor: grab;
            touch-action: none;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 flex h-screen">

    <!-- PANEL LATERAL -->
    <div class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl z-20 no-print flex-shrink-0">
        <div class="p-5 border-b border-slate-800">
            <div class="flex items-center gap-2 text-white">
                <i class="ph ph-book-open text-red-500 text-3xl"></i>
                <h1 class="text-2xl font-bold tracking-wider">Forge<span class="text-red-500">D&D</span></h1>
            </div>
            <div id="cloud-status" class="text-[10px] uppercase font-bold tracking-widest text-slate-500 flex items-center gap-1 mt-2">
                <i class="ph ph-check-circle"></i> Listo para forjar
            </div>
        </div>

        <div class="flex text-xs font-bold border-b border-slate-800">
            <button onclick="switchTab('add')" id="tab-btn-add" class="flex-1 py-3 border-b-2 transition-colors border-red-500 text-white bg-slate-800">
                Elementos
            </button>
            <button onclick="switchTab('library')" id="tab-btn-library" class="flex-1 py-3 border-b-2 transition-colors border-transparent text-slate-500 hover:text-slate-300">
                Biblioteca
            </button>
            <button onclick="switchTab('settings')" id="tab-btn-settings" class="flex-1 py-3 border-b-2 transition-colors border-transparent text-slate-500 hover:text-slate-300">
                Configuración
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4" id="sidebar-content"></div>

        <div class="p-4 bg-slate-950 flex flex-col gap-3">
            <div class="flex gap-2 bg-slate-800 p-1 rounded-lg relative">
                <button onclick="switchMode(true)" id="btn-edit-mode" class="flex-1 py-2 rounded text-sm font-bold flex justify-center items-center gap-2 bg-red-600 text-white shadow transition-colors">
                    <i class="ph ph-pencil-simple"></i> Editar
                </button>
                <button onclick="switchMode(false)" id="btn-preview-mode" class="flex-1 py-2 rounded text-sm font-bold flex justify-center items-center gap-2 hover:bg-slate-700 transition-colors">
                    <i class="ph ph-eye"></i> Ver A4
                </button>
            </div>
            
            <!-- Botones para Guardar/Cargar Localmente -->
            <div class="flex gap-2">
                <button onclick="downloadJSON()" class="flex-1 py-2 rounded text-xs font-bold flex justify-center items-center gap-1 bg-slate-700 text-white shadow hover:bg-slate-600 transition-colors">
                    <i class="ph ph-floppy-disk"></i> Guardar JSON
                </button>
                <button onclick="document.getElementById('file-upload').click()" class="flex-1 py-2 rounded text-xs font-bold flex justify-center items-center gap-1 bg-slate-700 text-white shadow hover:bg-slate-600 transition-colors">
                    <i class="ph ph-folder-open"></i> Cargar JSON
                </button>
                <input type="file" id="file-upload" class="hidden" accept=".json" onchange="loadJSON(event)">
            </div>

            <button onclick="exportPDF()" class="w-full py-3 bg-red-800 text-white rounded font-semibold hover:bg-red-900 shadow-md flex justify-center items-center gap-2 transition-colors mt-1">
                <i class="ph ph-download-simple text-lg"></i> Exportar a PDF
            </button>
        </div>
    </div>

    <!-- ÁREA PRINCIPAL -->
    <div class="flex-1 overflow-y-auto bg-slate-200 relative print-area" id="main-area">
        
        <div id="editor-container" class="max-w-4xl mx-auto space-y-6 p-8 pb-32">
            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-8 rounded shadow-sm text-blue-800 flex items-start gap-3">
                <i class="ph ph-info text-2xl"></i>
                <div class="text-sm flex-1">
                    <strong>Guardado Automático Local:</strong> Los cambios se guardan en este navegador aunque cierres la pestaña. <strong>Para respaldos seguros y no perder nada</strong>, usa los botones "<i class="ph ph-floppy-disk"></i> Guardar JSON" y "<i class="ph ph-folder-open"></i> Cargar JSON" del panel lateral.
                </div>
            </div>
            <div id="editor-blocks"></div>
        </div>

        <div id="preview-container" class="py-8 print:py-0 flex flex-col items-center hidden">
            <div id="preview-blocks" class="w-full flex flex-col items-center"></div>
        </div>
    </div>

    <!-- SCRIPT DE FIREBASE PARA GUARDADO EN LA NUBE (Opcional) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'forge-dnd-default';

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            let currentUser = null;

            window.saveStateToCloud = async (newState) => {
                if (!currentUser) return;
                window.updateCloudStatus('saving');
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'forge_dnd', 'state');
                    await setDoc(docRef, { data: JSON.stringify(newState) });
                    window.updateCloudStatus('saved');
                } catch (e) {
                    console.error("Error saving state", e);
                    window.updateCloudStatus('error');
                }
            };

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch(e) { console.error("Error Auth", e); window.updateCloudStatus('error'); }
            };

            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                if (user) {
                    window.updateCloudStatus('syncing');
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'forge_dnd', 'state');
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists()) {
                            const cloudState = JSON.parse(docSnap.data().data);
                            window.state.settings = { ...window.state.settings, ...(cloudState.settings || {}) };
                            window.state.blocks = cloudState.blocks || window.state.blocks;
                            window.applyGlobalStyles();
                            if (window.state.isEditMode) window.renderEditor();
                            else window.renderPreview();
                        }
                        window.updateCloudStatus('saved');
                    } catch (e) {
                        console.error("Error loading initial data", e);
                        window.updateCloudStatus('error');
                    }
                } else {
                    window.updateCloudStatus('error');
                }
            });

            initAuth();
        } else {
            window.saveStateToCloud = () => {};
            setTimeout(() => window.updateCloudStatus('saved'), 500);
        }
    </script>


    <!-- LOGICA PRINCIPAL DE LA APLICACIÓN -->
    <script>
        const Font = Quill.import('formats/font');
        Font.whitelist = ['cinzel', 'medievalsharp', 'lora', 'opensans'];
        Quill.register(Font, true);

        const BLOCK_TYPES = {
            COVER: 'COVER',
            TEXT: 'TEXT',
            TABLE: 'TABLE',
            STAT_BLOCK: 'STAT_BLOCK',
            HEADING_1: 'HEADING_1',
            HEADING_2: 'HEADING_2',
            PAGE_BREAK: 'PAGE_BREAK',
            SPACER: 'SPACER',
            IMAGE: 'IMAGE',
            CHARACTER_SHEET: 'CHARACTER_SHEET',
            CALLOUT: 'CALLOUT',
            TOC: 'TOC',
            CHAPTER: 'CHAPTER',
            SCENE: 'SCENE',
            NPC: 'NPC',
            MAGIC_ITEM: 'MAGIC_ITEM',
            LOCATION: 'LOCATION',
            ENCOUNTER: 'ENCOUNTER',
            LORE: 'LORE',
            RULE: 'RULE',
            QUEST: 'QUEST'
        };

        window.state = {
            isEditMode: true,
            activeTab: 'add',
            settings: {
                bgColor: '#fdfaf6',
                texture: 'parchment',
                titleColor: '#7f1d1d',
                tableBg: '#fdf1dc',
                tableBorder: '#991b1b',
                showBorders: false,
                columns: 2,
                startPageNumber: 1,
                footerText: '',
                watermarkText: '',
                bodyFont: "'Lora', serif",
                headingFont: "'Cinzel', serif"
            },
            imageLibrary: [],
            blocks: [
                { id: '1', type: BLOCK_TYPES.COVER, content: { title: 'Tomo del Maestro', subtitle: 'Guía de Campaña', author: 'Tu Nombre', topLabel: 'Manual de Campaña', bottomSeal: 'Edición del Director', imageUrl: '', imageRef: '' } },
                { id: '2', type: BLOCK_TYPES.TOC, content: { title: 'Índice de Contenidos', fontFamily: 'global', titleColor: '', itemColor: '', showDots: true } },
                { id: '3', type: BLOCK_TYPES.CHAPTER, content: { label: 'Capítulo I', title: 'El Despertar', subtitle: 'El inicio de la travesía', quote: 'Toda gran historia empieza con una chispa.', imageUrl: '', imageRef: '' } },
                { id: '4', type: BLOCK_TYPES.TEXT, content: { text: 'Escribe aquí la introducción de tu campaña, el trasfondo de tu mundo o las primeras páginas del manual.' } },
                { id: '5', type: BLOCK_TYPES.QUEST, content: { title: 'La primera misión', patron: 'Alcalde del pueblo', objective: 'Investigar las ruinas cercanas y recuperar el relicario perdido.', reward: '50 po y el favor del consejo.', text: '<p>Los personajes reciben el encargo al amanecer. El camino parece seguro, pero algo antiguo observa desde la colina.</p>' } }
            ]
        };
        const DEFAULT_STATE = JSON.parse(JSON.stringify(window.state));

        function cloneDefaultState() {
            return JSON.parse(JSON.stringify(DEFAULT_STATE));
        }

        function escAttr(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function stripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html || '';
            return tmp.textContent || tmp.innerText || '';
        }

        function updateCloudStatus(status) {
            const el = document.getElementById('cloud-status');
            if (!el) return;
            if (status === 'saving') el.innerHTML = '<i class="ph ph-spinner animate-spin text-blue-400"></i> Guardando...';
            else if (status === 'saved') el.innerHTML = '<i class="ph ph-check-circle text-green-500"></i> Guardado Local';
            else if (status === 'loaded') el.innerHTML = '<i class="ph ph-folder-open text-green-500"></i> Proyecto Cargado';
            else if (status === 'error') el.innerHTML = '<i class="ph ph-warning text-red-500"></i> Error';
            else if (status === 'syncing') el.innerHTML = '<i class="ph ph-arrows-clockwise animate-spin text-amber-500"></i> Obteniendo nube...';
            else if (status === 'pdf-success') el.innerHTML = '<i class="ph ph-file-pdf text-green-500"></i> PDF Descargado';
            else if (status === 'pdf-error') el.innerHTML = '<i class="ph ph-warning text-red-500"></i> Error en PDF';
            if (['saved', 'loaded', 'pdf-success', 'pdf-error'].includes(status)) {
                setTimeout(() => { el.innerHTML = '<i class="ph ph-check-circle"></i> Listo para forjar'; }, 4000);
            }
        }
        window.updateCloudStatus = updateCloudStatus;

        let saveTimeout = null;

        function saveStateLocal() {
            try {
                localStorage.setItem('forge_dnd_autosave', JSON.stringify(window.state));
            } catch (e) {
                console.warn('No se pudo guardar en localStorage. El proyecto puede estar muy pesado por imágenes grandes.', e);
            }
        }

        function mergeWithDefaults(parsed) {
            const base = cloneDefaultState();
            return {
                ...base,
                ...parsed,
                settings: { ...base.settings, ...(parsed.settings || {}) },
                imageLibrary: Array.isArray(parsed.imageLibrary) ? parsed.imageLibrary : [],
                blocks: Array.isArray(parsed.blocks) ? parsed.blocks : base.blocks
            };
        }

        function loadStateLocal() {
            try {
                const saved = localStorage.getItem('forge_dnd_autosave');
                if (!saved) return;
                const parsed = JSON.parse(saved);
                if (parsed && Array.isArray(parsed.blocks)) {
                    window.state = mergeWithDefaults(parsed);
                    updateCloudStatus('loaded');
                }
            } catch (e) {
                console.warn('No se pudo cargar el autoguardado local.', e);
            }
        }

        function triggerSave() {
            saveStateLocal();
            if (window.saveStateToCloud) {
                clearTimeout(saveTimeout);
                updateCloudStatus('saving');
                saveTimeout = setTimeout(() => {
                    window.saveStateToCloud(window.state);
                    updateCloudStatus('saved');
                }, 1500);
            }
        }

        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.state, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "forge_dnd_proyecto.json");
            dlAnchorElem.click();
            updateCloudStatus('saved');
        }
        window.downloadJSON = downloadJSON;

        function loadJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed && parsed.blocks) {
                        window.state = mergeWithDefaults(parsed);
                        applyGlobalStyles();
                        renderSidebar();
                        if (window.state.isEditMode) renderEditor();
                        else renderPreview();
                        triggerSave();
                        updateCloudStatus('loaded');
                    } else updateCloudStatus('error');
                } catch (error) {
                    updateCloudStatus('error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        window.loadJSON = loadJSON;

        function compressImage(dataUrl, maxWidth, callback) {
            const img = new Image();
            img.onload = function() {
                const sourceIsPng = dataUrl.startsWith('data:image/png');
                const sourceIsWebp = dataUrl.startsWith('data:image/webp');
                const outputType = sourceIsPng ? 'image/png' : (sourceIsWebp ? 'image/webp' : 'image/jpeg');

                if (img.width <= maxWidth && dataUrl.length < 1800000) {
                    callback(dataUrl);
                    return;
                }

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const ratio = Math.min(1, maxWidth / img.width);
                canvas.width = Math.round(img.width * ratio);
                canvas.height = Math.round(img.height * ratio);
                if (outputType === 'image/jpeg') {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                callback(canvas.toDataURL(outputType, outputType === 'image/png' ? undefined : 0.88));
            };
            img.onerror = function() {
                updateCloudStatus('error');
                callback(dataUrl);
            };
            img.src = dataUrl;
        }

        function generateId() { return Date.now().toString() + Math.random().toString(36).substring(2); }

        function getDefaultContent(type) {
            switch (type) {
                case BLOCK_TYPES.COVER: return { title: 'Nuevo Manual', subtitle: 'Subtítulo del manual', author: '', topLabel: 'Manual de Campaña', bottomSeal: 'Edición del Director', imageUrl: '', imageRef: '' };
                case BLOCK_TYPES.TEXT: return { text: 'Escribe tu párrafo épico aquí...' };
                case BLOCK_TYPES.HEADING_1: return { text: 'Nuevo Título Principal', fontFamily: 'global' };
                case BLOCK_TYPES.HEADING_2: return { text: 'Nuevo Subtítulo', fontFamily: 'global' };
                case BLOCK_TYPES.TABLE: return { title: 'Tabla Aleatoria', fontFamily: 'global', align: 'full', headers: ['d8', 'Resultado'], rows: [['1', 'Efecto A'], ['2', 'Efecto B']], useCustomColors: false, headerBg: '', headerColor: '', rowBgOdd: '', rowBgEven: '', cellColor: '' };

        function handleImageUpload(input, id, field) {
            const file = input.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                alert('El archivo seleccionado no parece ser una imagen.');
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                compressImage(e.target.result, 1600, (compressedImg) => {
                    const block = window.state.blocks.find(b => b.id === id);
                    if (!block) return;
                    block.content[field] = compressedImg;
                    if (field === 'imageUrl') block.content.imageRef = '';
                    renderEditor();
                    triggerSave();
                });
            };
            reader.readAsDataURL(file);
            input.value = '';
        }
        window.handleImageUpload = handleImageUpload;

        function clearImage(id, field) {
            const block = window.state.blocks.find(b => b.id === id);
            if (!block) return;
            block.content[field] = '';

            renderEditor();
            triggerSave();

        window.clearImage = clearImage;

        function handleLibraryUpload(event) {
            const files = Array.from(event.target.files || []);
            if (!files.length) return;
            let pending = files.length;
            files.forEach(file => {
                if (!file.type.startsWith('image/')) {
                    pending--;
                    if (!pending) { renderSidebar(); triggerSave(); }
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    compressImage(e.target.result, 1400, (compressedImg) => {
                        window.state.imageLibrary.push({
                            id: generateId(),
                            name: file.name.replace(/\.[^.]+$/, ''),
                            dataUrl: compressedImg
                        });
                        pending--;
                        if (!pending) {
                            renderSidebar();
                            if (window.state.isEditMode) renderEditor(); else renderPreview();
                            triggerSave();
                        }
                    });
                };
                reader.readAsDataURL(file);
            });
            event.target.value = '';
        }

        function removeQuillFontClasses(html) {
            if (!html || typeof html !== 'string') return html || '';

                const kept = String(el.className)
                    .split(/\s+/)
                    .filter(cls => cls && !cls.startsWith('ql-font-'))
                    .join(' ');
                if (kept) el.className = kept;
                else el.removeAttribute('class');
            });
            return div.innerHTML;

        function clearDragMarkers() {
            document.querySelectorAll('.editor-block-wrapper').forEach(el => {

                delete el.dataset.dropPosition;
            });
        }

        function reorderBlockById(draggedId, targetId, position = 'before') {
            if (!draggedId || !targetId || draggedId === targetId) return;
            const oldIndex = window.state.blocks.findIndex(b => b.id === draggedId);
            if (oldIndex === -1) return;

            const [moved] = window.state.blocks.splice(oldIndex, 1);
            let targetIndex = window.state.blocks.findIndex(b => b.id === targetId);
            if (targetIndex === -1) {
                window.state.blocks.splice(oldIndex, 0, moved);
                return;
            }

            if (position === 'after') targetIndex += 1;
            window.state.blocks.splice(targetIndex, 0, moved);
            renderEditor();
            triggerSave();
        }

        function initializeDragAndDrop() {
            let draggedId = null;

            document.querySelectorAll('.drag-handle').forEach(handle => {
                handle.addEventListener('dragstart', event => {
                    const wrapper = handle.closest('.editor-block-wrapper');
                    if (!wrapper) return;
                    draggedId = wrapper.dataset.blockId;
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('text/plain', draggedId);
                    requestAnimationFrame(() => wrapper.classList.add('dragging'));
                });

                handle.addEventListener('dragend', () => {
                    draggedId = null;
                    clearDragMarkers();
                });
            });

            document.querySelectorAll('.editor-block-wrapper').forEach(wrapper => {
                wrapper.addEventListener('dragover', event => {
                    if (!draggedId || wrapper.dataset.blockId === draggedId) return;
                    event.preventDefault();
                    const rect = wrapper.getBoundingClientRect();
                    const isAfter = event.clientY > rect.top + rect.height / 2;
                    wrapper.dataset.dropPosition = isAfter ? 'after' : 'before';
                    wrapper.classList.toggle('drag-over-before', !isAfter);
                    wrapper.classList.toggle('drag-over-after', isAfter);
                });

                wrapper.addEventListener('dragleave', event => {
                    if (!wrapper.contains(event.relatedTarget)) {
                        wrapper.classList.remove('drag-over-before', 'drag-over-after');
                    }
                });

                wrapper.addEventListener('drop', event => {
                    event.preventDefault();
                    const idFromEvent = event.dataTransfer.getData('text/plain') || draggedId;
                    const position = wrapper.dataset.dropPosition || 'before';
                    clearDragMarkers();
                    reorderBlockById(idFromEvent, wrapper.dataset.blockId, position);
                });
            });
        }

                else if (c.align === 'full') { alignClasses += 'block '; alignStyles += 'column-span: all; width:100%;'; }
                else { alignClasses += 'mx-auto block '; alignStyles += `width:${safeWidth}%;`; }
                const frameShadow = c.shadow !== false ? 'box-shadow:0 4px 10px rgba(0,0,0,0.18);' : '';
                const frameStyle = c.framed ? `border: 4px solid ${titleColor}; padding: 5px; background-color: ${tableBg}; ${frameShadow}` : frameShadow;
                const imageHeight = fit === 'cover' ? `height:${maxHeight}px;` : `max-height:${maxHeight}px; height:auto;`;
                const imageStyle = `width:100%; ${imageHeight} object-fit:${fit}; object-position:center; border-radius:${radius}px; display:block;`;
                const captionHtml = c.caption ? `<div class="${c.captionSize || 'text-sm'} italic mt-2 text-slate-700 text-center font-bold" style="${c.captionFont && c.captionFont !== 'global' ? `font-family:${c.captionFont};` : ''} display:block;">${c.caption}</div>` : '';
                const imgUrl = resolveImageUrl(c);
                return `<div class="${alignClasses}" style="${alignStyles}"><div style="${frameStyle} display:inline-block; width:100%; max-width:100%; box-sizing:border-box;">${imgUrl ? `<img src="${imgUrl}" style="${imageStyle}">` : `<div class="p-8 bg-slate-200 text-slate-500 italic flex items-center justify-center min-h-[150px] min-w-[200px]">Sube una imagen</div>`}</div>${captionHtml}</div>`;
            }
            if (block.type === BLOCK_TYPES.CHAPTER) {
                const imgUrl = resolveImageUrl(c);
                return `<div class="my-8 break-inside-avoid block" style="column-span: all; display:block; background: linear-gradient(180deg, rgba(127,29,29,0.08), rgba(127,29,29,0.02)); border:1px solid rgba(127,29,29,0.22); padding:18px; border-radius:8px;"><div class="text-xs uppercase tracking-[0.3em] font-bold mb-3" style="color:${titleColor}; font-family:${headingFont};">${c.label || ''}</div>${imgUrl ? `<div style="margin-bottom:14px; border:3px solid ${titleColor}; background:${tableBg}; padding:5px;"><img src="${imgUrl}" style="width:100%; max-height:260px; object-fit:cover; display:block;"></div>` : ''}<h2 style="font-size:34px; line-height:1.1; margin:0 0 6px 0; color:${titleColor}; font-family:${headingFont};">${c.title || ''}</h2><div style="font-size:17px; color:#475569; font-style:italic; margin-bottom:10px;">${c.subtitle || ''}</div>${c.quote ? `<div style="border-left:3px solid ${titleColor}; padding-left:12px; color:#334155; font-style:italic;">${c.quote}</div>` : ''}</div>`;
            }
            if (block.type === BLOCK_TYPES.SCENE) {
                return `<div class="my-5 p-4 break-inside-avoid" style="background:#fff7ed; border:1px solid #fdba74; border-left:6px solid #ea580c; display:block;"><div style="display:flex; justify-content:space-between; gap:12px; margin-bottom:8px;"><h3 style="font-size:22px; font-weight:700; color:#9a3412; margin:0;">${c.title || ''}</h3><span style="font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:#c2410c;">${c.mood || ''}</span></div><div class="quill-content text-slate-800 leading-relaxed">${c.text}</div></div>`;
            }
            if (block.type === BLOCK_TYPES.NPC) {
                const imgUrl = resolveImageUrl(c);
                return `<div class="my-6 break-inside-avoid block" style="display:block; background:#f5f3ff; border:1px solid #c4b5fd; padding:16px; border-radius:8px;"><div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:12px;"><div><h3 style="margin:0; font-size:26px; color:#5b21b6; font-family:${headingFont};">${c.name || ''}</h3><div style="font-size:13px; text-transform:uppercase; letter-spacing:0.12em; color:#7c3aed; font-weight:700;">${c.role || ''}</div><div style="margin-top:4px; color:#475569; font-style:italic;">${c.subtitle || ''}</div></div>${imgUrl ? `<div style="width:30%; min-width:120px; border:2px solid #8b5cf6; padding:4px; background:white;"><img src="${imgUrl}" style="width:100%; max-height:200px; object-fit:cover; display:block;"></div>` : ''}</div><div class="quill-content" style="margin-bottom:10px; color:#1e293b;">${c.text}</div>${c.secret ? `<div style="background:#ede9fe; border-left:4px solid #7c3aed; padding:10px;"><div style="font-weight:700; color:#5b21b6; margin-bottom:4px;">Secreto / nota del DM</div><div class="quill-content text-slate-800">${c.secret}</div></div>` : ''}</div>`;
            }
            if (block.type === BLOCK_TYPES.MAGIC_ITEM) {
                return `<div class="my-6 break-inside-avoid block" style="display:block; background:linear-gradient(180deg, #ecfeff, #f8fafc); border:1px solid #67e8f9; padding:16px; border-radius:8px;"><div style="display:flex; justify-content:space-between; gap:12px; margin-bottom:10px;"><div><h3 style="margin:0; font-size:25px; color:#155e75; font-family:${headingFont};">${c.name || ''}</h3><div style="font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:#0891b2; font-weight:700;">${c.rarity || ''} · ${c.category || ''}</div></div><div style="font-size:12px; color:#164e63; font-weight:700; text-align:right;">${c.attunement || ''}</div></div><div class="quill-content text-slate-800 mb-3">${c.text}</div><div style="background:white; border-left:4px solid #06b6d4; padding:10px;"><div style="font-weight:700; color:#155e75; margin-bottom:4px;">Propiedades</div><div class="quill-content text-slate-800">${c.effect}</div></div></div>`;
            }
            if (block.type === BLOCK_TYPES.LOCATION) {
                const imgUrl = resolveImageUrl(c);
                return `<div class="my-6 break-inside-avoid block" style="display:block; background:#ecfdf5; border:1px solid #86efac; padding:16px; border-radius:8px;">${imgUrl ? `<div style="border:3px solid #166534; padding:4px; background:white; margin-bottom:12px;"><img src="${imgUrl}" style="width:100%; max-height:240px; object-fit:cover; display:block;"></div>` : ''}<div style="display:flex; justify-content:space-between; gap:10px; align-items:end; margin-bottom:8px;"><h3 style="margin:0; font-size:28px; color:#166534; font-family:${headingFont};">${c.name || ''}</h3><div style="font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:#15803d; font-weight:700;">${c.region || ''}</div></div><div class="quill-content text-slate-800 mb-2">${c.text}</div>${c.features ? `<div style="font-size:13px; color:#166534; font-weight:700; margin-top:8px;">Ganchos / detalles: <span style="font-weight:400; color:#334155;">${c.features}</span></div>` : ''}</div>`;
            }
            if (block.type === BLOCK_TYPES.ENCOUNTER) {
                return `<div class="my-6 break-inside-avoid block" style="display:block; background:#fff1f2; border:1px solid #fda4af; padding:16px; border-radius:8px;"><div style="display:flex; justify-content:space-between; gap:12px; margin-bottom:10px;"><h3 style="margin:0; font-size:26px; color:#9f1239; font-family:${headingFont};">${c.title || ''}</h3><span style="padding:4px 10px; background:#ffe4e6; border:1px solid #fb7185; font-size:12px; text-transform:uppercase; letter-spacing:0.12em; font-weight:700; color:#be123c;">${c.difficulty || ''}</span></div><div style="display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:8px; margin-bottom:10px; font-size:13px;"><div><strong>Participantes:</strong> ${c.enemies || ''}</div><div><strong>Objetivo:</strong> ${c.objective || ''}</div><div><strong>Terreno:</strong> ${c.terrain || ''}</div><div><strong>Recompensa:</strong> ${c.reward || ''}</div></div><div class="quill-content text-slate-800">${c.text}</div></div>`;
            }
            if (block.type === BLOCK_TYPES.LORE) {
                return `<div class="my-6 break-inside-avoid block" style="display:block; background:#eef2ff; border:1px solid #a5b4fc; padding:16px; border-radius:8px;"><div style="font-size:12px; text-transform:uppercase; letter-spacing:0.16em; color:#4338ca; font-weight:700; margin-bottom:6px;">${c.era || ''}</div><h3 style="margin:0 0 10px 0; font-size:25px; color:#3730a3; font-family:${headingFont};">${c.title || ''}</h3><div class="quill-content text-slate-800">${c.text}</div></div>`;
            }
            if (block.type === BLOCK_TYPES.RULE) {
                return `<div class="my-6 break-inside-avoid block" style="display:block; background:#eff6ff; border:1px solid #93c5fd; padding:16px; border-radius:8px;"><div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:8px;"><h3 style="margin:0; font-size:24px; color:#1d4ed8; font-family:${headingFont};">${c.title || ''}</h3><div style="font-size:12px; font-weight:700; color:#2563eb; text-transform:uppercase; letter-spacing:0.12em;">${c.category || ''}</div></div><div class="quill-content text-slate-800">${c.text}</div></div>`;
            }
            if (block.type === BLOCK_TYPES.QUEST) {
                return `<div class="my-6 break-inside-avoid block" style="display:block; background:#fefce8; border:1px solid #facc15; padding:16px; border-radius:8px;"><div style="display:flex; justify-content:space-between; gap:10px; align-items:start; margin-bottom:8px;"><div><h3 style="margin:0; font-size:26px; color:#a16207; font-family:${headingFont};">${c.title || ''}</h3><div style="font-size:13px; color:#92400e;"><strong>Patrón:</strong> ${c.patron || ''}</div></div><div style="font-size:13px; color:#92400e; text-align:right;"><strong>Recompensa:</strong><br>${c.reward || ''}</div></div><div style="font-size:13px; color:#92400e; margin-bottom:8px;"><strong>Objetivo:</strong> ${c.objective || ''}</div><div class="quill-content text-slate-800">${c.text}</div></div>`;
            }
            if (block.type === BLOCK_TYPES.TABLE) {
                let alignClasses = 'my-6 break-inside-avoid ';
                let alignStyles = customStyle;
                if (c.align === 'left') alignClasses += 'float-left mr-6 max-w-[50%] ';
                else if (c.align === 'right') alignClasses += 'float-right ml-6 max-w-[50%] ';
                else if (c.align === 'center') alignClasses += 'mx-auto block w-full ';
                else if (c.align === 'full') { alignStyles += 'column-span: all; width:100%; display:block; '; alignClasses += 'block w-full '; }
                else alignClasses += 'w-full inline-block ';
                const hBg = c.useCustomColors && c.headerBg ? c.headerBg : tableBg;
                const hCol = c.useCustomColors && c.headerColor ? c.headerColor : titleColor;
                const rOdd = c.useCustomColors && c.rowBgOdd ? c.rowBgOdd : '#f8f1e7';
                const rEven = c.useCustomColors && c.rowBgEven ? c.rowBgEven : 'transparent';
                const cellCol = c.useCustomColors && c.cellColor ? c.cellColor : '#334155';
                const titleHtml = c.title ? `<h4 class="font-bold mb-2 uppercase text-sm" style="color:${titleColor}; display:block;">${c.title}</h4>` : '';
                const headersHtml = c.headers.map(h => `<th class="p-3 font-bold" style="color:${hCol};">${h}</th>`).join('');
                const rowsHtml = c.rows.map((row, rIdx) => `<tr style="background-color:${rIdx % 2 === 0 ? rOdd : rEven};">${row.map(cell => `<td class="p-3" style="color:${cellCol}; border-bottom:${borderThin} solid rgba(0,0,0,.15);">${cell}</td>`).join('')}</tr>`).join('');
                return `<div class="${alignClasses}" style="${alignStyles} display:block;">${titleHtml}<table class="w-full text-left border-collapse font-serif text-sm bg-white" style="${!s.showBorders ? 'box-shadow:none; border-radius:8px; overflow:hidden;' : 'box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);'}"><thead><tr style="background-color:${hBg}; border-bottom:${borderWidth} solid ${tableBorder};">${headersHtml}</tr></thead><tbody>${rowsHtml}</tbody></table></div>`;
            }
            if (block.type === BLOCK_TYPES.STAT_BLOCK) {
                const statsHtml = `<table style="width:100%; text-align:center; color:${titleColor}; margin:15px 0; table-layout:fixed; border-collapse:collapse;"><tr>` + ['str', 'dex', 'con', 'int', 'wis', 'cha'].map(stat => `<td style="padding:0; text-align:center;"><div style="font-weight:bold; text-transform:uppercase; font-size:11px; margin-bottom:2px;">${stat.substring(0,3)}</div><div style="font-size:16px;">${c.stats[stat] || '10'}</div></td>`).join('') + `</tr></table>`;
                const boxStyle = !s.showBorders ? 'box-shadow:none; border-radius:8px;' : 'box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);';
                return `<div class="my-6 break-inside-avoid" style="${customStyle} display:block; width:100%; padding:20px; background-color:${tableBg}; border-top:calc(${borderWidth} * 2) solid ${tableBorder}; border-bottom:calc(${borderWidth} * 2) solid ${tableBorder}; ${boxStyle} box-sizing:border-box;"><h1 style="font-size:24px; font-weight:bold; font-family:${headingFont}; padding-bottom:4px; color:${titleColor}; border-bottom:${borderWidth} solid ${tableBorder}; margin:0 0 8px 0;">${c.name || 'Monster Name'}</h1><p style="font-style:italic; color:#334155; margin:0 0 8px 0; font-size:14px; display:block;">${c.meta || 'Medium humanoid'}</p><div style="padding:8px 0; margin:12px 0; border-top:${borderThin} solid ${tableBorder}; border-bottom:${borderThin} solid ${tableBorder}; color:${titleColor}; font-size:14px; display:block;"><div style="margin-bottom:4px; display:block;"><strong>Armor Class</strong> ${c.ac || ''}</div><div style="margin-bottom:4px; display:block;"><strong>Hit Points</strong> ${c.hp || ''}</div><div style="display:block;"><strong>Speed</strong> ${c.speed || ''}</div></div>${statsHtml}<div class="quill-content" style="padding-top:12px; border-top:${borderThin} solid ${tableBorder}; color:#1e293b; font-size:14px; display:block;">${c.traits}</div></div>`;
            }
            return '';
        }

        function renderPreview() {
            const container = document.getElementById('preview-blocks');
            container.innerHTML = '';
            const s = window.state.settings;
            const bodyFont = s.bodyFont || "'Lora', serif";
            const headingFont = s.headingFont || "'Cinzel', serif";
            let pageNum = (parseInt(s.startPageNumber) || 1) - 1;
            let currentContentArea = null;
            let blockPageMap = {};

            function createNewPage(isCover = false) {
                const page = document.createElement('div');
                page.className = 'a4-page relative';
                if (isCover) {
                    currentContentArea = null;
                } else {
                    pageNum++;
                    const watermarkHtml = s.watermarkText ? `<div class="watermark">${s.watermarkText}</div>` : '';
                    const headerHtml = s.footerText ? `<div class="absolute top-[8mm] left-0 w-full flex justify-end items-center px-[15mm] text-xs font-bold opacity-70 z-0 tracking-widest uppercase" style="color: var(--title-color); font-family:${headingFont};"><span>${s.footerText}</span></div>` : '';
                    const footerHtml = `<div class="absolute bottom-[8mm] left-0 w-full flex justify-center items-center px-[15mm] text-xs font-bold opacity-70 z-0" style="color: var(--title-color); font-family:${headingFont};"><span>- ${pageNum} -</span></div>`;
                    page.innerHTML = `${watermarkHtml}${headerHtml}<div class="page-content absolute inset-0" style="column-count: ${s.columns}; column-gap: 10mm; column-fill: auto; overflow: hidden; font-family:${bodyFont};"></div>${footerHtml}`;
                    currentContentArea = page.querySelector('.page-content');
                }
                container.appendChild(page);
                return page;
            }

            let activePage = createNewPage();

            for (let i = 0; i < window.state.blocks.length; i++) {
                const block = window.state.blocks[i];
                if (block.type === BLOCK_TYPES.PAGE_BREAK) {
                    activePage = createNewPage();
                    continue;
                }

                if (block.type === BLOCK_TYPES.COVER || block.type === BLOCK_TYPES.CHARACTER_SHEET) {
                    const c = block.content;
                    if (currentContentArea && currentContentArea.innerHTML.trim() !== '') activePage = createNewPage(true);
                    else activePage.innerHTML = '';
                    if (block.type === BLOCK_TYPES.COVER) {
                        const bgUrl = resolveImageUrl(c);
                        activePage.innerHTML = `
                            <div class="absolute inset-0" style="background: linear-gradient(180deg, #1a0e0a, #0b0908); color: white; overflow:hidden;">
                                <div class="absolute inset-[10mm]" style="border: 4px solid #c9a25c;"></div>
                                <div class="absolute inset-[14mm]" style="border: 1px solid rgba(255,237,191,0.8);"></div>
                                <div class="absolute inset-[18mm] flex flex-col z-10">
                                    <div class="text-center py-4 px-6" style="background: linear-gradient(180deg, rgba(127,29,29,0.95), rgba(90,14,14,0.95)); border: 3px solid #d4b06a; box-shadow: inset 0 0 0 1px rgba(255,228,170,0.35);">
                                        <div style="font-family:${headingFont}; font-size:12px; letter-spacing:0.45em; text-transform:uppercase; color:#f8e6b5; margin-bottom:8px;">${c.topLabel || 'Manual de Campaña'}</div>
                                        <h1 style="font-family:${headingFont}; font-size:52px; line-height:1; margin:0; color:#fff7db; text-transform:uppercase; letter-spacing:0.08em; text-shadow: 0 2px 16px rgba(0,0,0,.55);">${c.title || ''}</h1>
                                    </div>
                                    <div class="relative flex-1 my-4 overflow-hidden" style="border:4px solid #d4b06a; background:#111; box-shadow: inset 0 0 40px rgba(0,0,0,.45);">
                                        ${bgUrl ? `<img src="${bgUrl}" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;">` : `<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#f8e6b5; font-family:${headingFont}; font-size:30px; background:radial-gradient(circle at center, rgba(127,29,29,.35), rgba(0,0,0,.85));">Ilustración principal</div>`}
                                        <div style="position:absolute; inset:0; background: linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.2) 45%, rgba(0,0,0,.68));"></div>
                                        <div style="position:absolute; left:0; right:0; bottom:0; padding:22px 24px 26px; text-align:center;">
                                            <div style="display:inline-block; padding:10px 18px; background: rgba(19,10,8,.78); border: 2px solid rgba(242,220,168,.72); box-shadow:0 0 18px rgba(0,0,0,.32);">
                                                <div style="font-family:${bodyFont}; font-style:italic; font-size:24px; color:#fff4cc; margin-bottom:6px;">${c.subtitle || ''}</div>
                                                <div style="font-size:14px; letter-spacing:0.16em; text-transform:uppercase; color:#e6d3a1;">${c.author || ''}</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex items-center justify-between gap-4">
                                        <div style="flex:1; height:2px; background: linear-gradient(90deg, transparent, #d4b06a, transparent);"></div>
                                        <div style="padding:8px 20px; border:2px solid #d4b06a; color:#f3e0b0; font-family:${headingFont}; font-size:13px; text-transform:uppercase; letter-spacing:0.25em; background:rgba(127,29,29,.45);">${c.bottomSeal || 'Edición del Director'}</div>
                                        <div style="flex:1; height:2px; background: linear-gradient(90deg, transparent, #d4b06a, transparent);"></div>
                                    </div>
                                </div>
                            </div>`;
                    } else {
                        activePage.innerHTML = `<div class="absolute inset-0 z-20 flex items-center justify-center text-slate-400 font-bold bg-white text-xl border-[15mm] border-transparent" style="border-image: var(--page-texture) 30 repeat; background-color: var(--page-bg);">La hoja de personaje completa renderiza aquí.</div>`;
                    }
                    activePage = createNewPage();
                    continue;
                }

                const htmlString = getBlockHtmlString(block);
                if (!htmlString) continue;
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = htmlString;
                const blockNode = tempDiv.firstElementChild;
                if (!currentContentArea) activePage = createNewPage();
                blockPageMap[block.id] = pageNum;
                currentContentArea.appendChild(blockNode);
                if (currentContentArea.scrollHeight > Math.ceil(currentContentArea.clientHeight) || currentContentArea.scrollWidth > Math.ceil(currentContentArea.clientWidth)) {
                    if (currentContentArea.children.length === 1) continue;
                    currentContentArea.removeChild(blockNode);
                    activePage = createNewPage();
                    blockPageMap[block.id] = pageNum;
                    currentContentArea.appendChild(blockNode);
                }
            }

            const tocPlaceholders = document.querySelectorAll('[data-toc="true"]');
            if (tocPlaceholders.length > 0) {
                const headings = window.state.blocks.filter(b => [BLOCK_TYPES.HEADING_1, BLOCK_TYPES.HEADING_2, BLOCK_TYPES.CHAPTER].includes(b.type));
                tocPlaceholders.forEach(el => {
                    const tocTitle = el.getAttribute('data-title');
                    const font = el.getAttribute('data-font');
                    const titleColor = el.getAttribute('data-titlecolor');
                    const itemColor = el.getAttribute('data-itemcolor');
                    const showDots = el.getAttribute('data-showdots') === 'true';
                    const bColor = el.getAttribute('data-bordercolor');
                    const bWidth = el.getAttribute('data-borderwidth');
                    const customFont = font !== 'global' ? `font-family: ${font};` : `font-family:${headingFont};`;
                    const itemFont = font !== 'global' ? `font-family: ${font};` : `font-family: 'Open Sans', sans-serif;`;
                    let tocHtml = `<div class="mb-4 block w-full" style="page-break-inside:avoid; display:block;"><h2 class="text-3xl font-bold mb-4 pb-2" style="color:${titleColor}; border-bottom:${bWidth} solid ${bColor}; ${customFont} display:block;">${tocTitle}</h2>`;
                    headings.forEach(h => {
                        const pNum = blockPageMap[h.id] || '-';
                        const isH1 = h.type === BLOCK_TYPES.HEADING_1 || h.type === BLOCK_TYPES.CHAPTER;
                        const ml = isH1 ? '' : 'margin-left:1.5rem;';
                        const fw = isH1 ? 'font-weight:bold; font-size:1.1rem; margin-top:0.5rem;' : 'font-size:0.95rem;';
                        const cleanText = h.type === BLOCK_TYPES.CHAPTER ? (h.content.title || 'Capítulo') : stripHtml(h.content.text);
                        const dotsHtml = showDots ? `<div class="flex-grow border-b-2 border-dotted border-slate-400 mx-1 opacity-50 relative top-[-4px]"></div>` : `<div class="flex-grow mx-1"></div>`;
                        tocHtml += `<div class="flex items-baseline w-full" style="${ml} ${fw} margin-bottom:0.25rem; color:${itemColor}; ${itemFont}"><span class="pr-2">${cleanText}</span>${dotsHtml}<span class="pl-2">${pNum}</span></div>`;
                    });
                    tocHtml += '</div>';
                    el.innerHTML = tocHtml;
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadStateLocal();
            applyGlobalStyles();
            renderSidebar();
            if (window.state.isEditMode) renderEditor();
            else renderPreview();
        });
    </script>
</body>
</html>
